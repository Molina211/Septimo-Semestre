version: '3.8'

services:
  mysql_ventas:
    image: mysql:8.0.33
    container_name: mysql_ventas
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: molina21109
      MYSQL_DATABASE: maveitmap
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: 
      - --bind-address=0.0.0.0
      - --authentication_policy=mysql_native_password

volumes:
  mysql_data: