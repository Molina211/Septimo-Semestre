name: proyecto_calidad_de_software

services:
  mysql_mapwebbusiness:
    image: mysql:8.0.33
    container_name: database_mapwebbusiness
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: molina211
      MYSQL_DATABASE: mysql_mapwebbusiness
      MYSQL_USER: map
      MYSQL_PASSWORD: Molina211
    ports:
      - "3309:3306"
    volumes:
      - proyecto_calidad_mysql_data:/var/lib/mysql
    command:
      - --bind-address=0.0.0.0
      - --authentication_policy=mysql_native_password

volumes:
  proyecto_calidad_mysql_data:
